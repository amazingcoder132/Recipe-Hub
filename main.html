<!DOCTYPE html>
<html>
<head>
    <title>Recipe Website</title>
    <style>
        body {
            background-color: #1e1b3a;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 40px;
            margin-bottom: 10px;
        }

        h2 {
            color: #e0dfff;
            margin-top: 25px;
        }

        hr {
            border: 1px solid #ffffff;
            width: 80%;
            margin: 20px auto;
        }

        button {
            background-color: #ffffff;
            color: #1e1b3a;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #d6d6ff;
        }
    </style>
</head>

<body>
    <h1>Website for Recipe Lovers</h1>
    <hr>

    <h2>Breakfast Recipes</h2>
    <a href="breakfast.html"><button>Breakfast Page</button></a>

    <h2>Lunch Recipes</h2>
    <a href="lunch.html"><button>Lunch Page</button></a>


</body>
</html>
